name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      - name: Install PHP dependencies
        run: composer install --no-dev --optimize-autoloader

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node dependencies & build
        run: |
          npm install
          npm run build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy via Rsync
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/id_ed25519 -p ${{ secrets.SSH_PORT }}" \
            --exclude='.git' \
            --exclude='.git/**' \
            --exclude='node_modules' \
            --exclude='node_modules/**' \
            --exclude='.env' \
            --exclude='vendor' \
            --exclude='vendor/**' \
            --exclude='tests' \
            --exclude='tests/**' \
            ./ ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:/home/u348604072/domains/vivabyte.eu/vivabyte-website/

      - name: Run post-deploy commands
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd ~/domains/vivabyte.eu/vivabyte-website

            # Create .env if missing or empty
            if [ ! -s .env ]; then
              echo "$ENV_FILE" > .env
              php artisan key:generate
            fi

            # Recreate symlink if broken
            if [ ! -L /home/u348604072/domains/vivabyte.eu/public_html ]; then
              rm -rf /home/u348604072/domains/vivabyte.eu/public_html
              ln -s /home/u348604072/domains/vivabyte.eu/vivabyte-website/public /home/u348604072/domains/vivabyte.eu/public_html
            fi

            composer install --no-dev --optimize-autoloader
            php artisan optimize
            chmod -R 775 storage bootstrap/cache
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
