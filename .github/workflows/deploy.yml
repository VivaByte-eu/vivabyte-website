name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node dependencies & build
        run: |
          npm install
          npm run build

      - name: Deploy via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: './'
          target: '/home/u348604072/domains/vivabyte.eu/vivabyte-website/'
          exclude: '.git,.git/**,node_modules,node_modules/**,tests,tests/**,.env,vendor,vendor/**'

      - name: Run post-deploy commands
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd ~/domains/vivabyte.eu/vivabyte-website

            # Create .env only if it doesn't exist
            if [ ! -f .env ]; then
              echo "$ENV_FILE" > .env
              php artisan key:generate
            fi

            composer install --no-dev --optimize-autoloader
            php artisan optimize
            chmod -R 775 storage bootstrap/cache
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
